name: MyPepTracker
options:
  bundleIdPrefix: com.greg.roy
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "7FCS8W78F5"
    SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
schemes:
  MyPepTracker:
    build:
      targets:
        MyPepTracker: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MyPepTrackerTests
        - MyPepTrackerUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  MyPepTracker:
    type: application
    platform: iOS
    sources:
      - MyPepTracker
    resources:
      - MyPepTracker/Resources
    settings:
      base:
        INFOPLIST_KEY_CFBundleDisplayName: MyPepTracker
        MARKETING_VERSION: "1.13.0"
        CURRENT_PROJECT_VERSION: "18"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MyPepTracker/MyPepTracker.entitlements
        # Auto-answer "Missing Compliance" on TestFlight — the app only uses
        # HTTPS (Apple's always-exempt category) so this is truthful and lets
        # builds skip the manual Export Compliance click in ASC.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSHealthShareUsageDescription: "MyPepTracker can read weight and body fat percentage from Apple Health to display alongside your tracking data."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "MyPepTracker writes weight and body fat percentage measurements to Apple Health when you enable sync in Settings."
    dependencies:
      - sdk: HealthKit.framework
  MyPepTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - MyPepTrackerTests
    dependencies:
      - target: MyPepTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  MyPepTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - MyPepTrackerUITests
    dependencies:
      - target: MyPepTracker
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: MyPepTracker
